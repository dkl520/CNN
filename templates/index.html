<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNN 图片分类演示</title>
  <style>
    :root {
      --bg: #f6efe3;
      --panel: rgba(255, 252, 246, 0.92);
      --ink: #1f2933;
      --muted: #52606d;
      --accent: #d96c3f;
      --accent-2: #2e6f95;
      --line: rgba(31, 41, 51, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(217, 108, 63, 0.20), transparent 30%),
        radial-gradient(circle at bottom right, rgba(46, 111, 149, 0.18), transparent 28%),
        linear-gradient(135deg, #f4ead8, #f8f4ee 45%, #ece6db);
      min-height: 100vh;
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 32px auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(31, 41, 51, 0.10);
      backdrop-filter: blur(10px);
    }

    .sidebar, .content { padding: 24px; }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
    }

    .lead, .hint, .meta, .empty, .error {
      color: var(--muted);
      line-height: 1.6;
    }

    .upload-box {
      margin-top: 20px;
      padding: 18px;
      border: 1.5px dashed rgba(46, 111, 149, 0.35);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.66);
    }

    input[type="file"] {
      width: 100%;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent), #c24d1d);
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .preview {
      margin-top: 18px;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 18px;
      object-fit: cover;
      background: rgba(31, 41, 51, 0.06);
      display: none;
    }

    .status {
      min-height: 24px;
      margin-top: 12px;
      font-size: 14px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .badge {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(46, 111, 149, 0.12);
      color: var(--accent-2);
      font-weight: 700;
      white-space: nowrap;
    }

    .result-head {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--line);
    }

    .stat strong {
      display: block;
      font-size: 28px;
      margin-top: 6px;
    }

    .chart-card, .table-card {
      padding: 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
    }

    .chart-wrap {
      height: 320px;
      display: flex;
      gap: 10px;
      align-items: end;
      padding-top: 12px;
      overflow-x: auto;
    }

    .bar-group {
      min-width: 58px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: end;
      gap: 10px;
    }

    .bar-value {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-2);
    }

    .bar {
      width: 100%;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(180deg, #ef9a5d, #d96c3f);
      min-height: 2px;
      transition: height 0.3s ease;
    }

    .bar-label {
      font-size: 12px;
      text-align: center;
      color: var(--muted);
      word-break: break-word;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
    }

    th { font-size: 13px; color: var(--muted); }
    td:last-child, th:last-child { text-align: right; }

    .hidden { display: none; }
    .error { color: #b42318; }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .result-head { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card sidebar">
      <p class="badge">{{ "模型已就绪" if model_ready else "缺少模型文件" }}</p>
      <h1>图片分类预测</h1>
      <p class="lead">上传一张图片，后端 Python 会给出每个类别的概率分布，并用直方图展示。</p>
      <div class="upload-box">
        <input id="imageInput" type="file" accept="image/*">
        <button id="predictButton" {% if not model_ready %}disabled{% endif %}>开始预测</button>
        <div id="status" class="status hint">
          {% if model_ready %}
            支持 JPG、PNG、JPEG 等常见图片格式。
          {% else %}
            请先运行训练脚本，生成 `checkpoints/best_model.pth`。
          {% endif %}
        </div>
      </div>
      <img id="preview" class="preview" alt="上传图片预览">
    </section>

    <section class="card content">
      <div class="hero">
        <div>
          <h2 style="margin: 0 0 8px;">预测结果</h2>
          <p class="hint" style="margin: 0;">当前模型适用于 CIFAR-10 的 10 个类别。</p>
        </div>
      </div>

      <div id="resultPanel" class="hidden">
        <div class="result-head">
          <div class="stat">
            <span class="meta">最高概率类别</span>
            <strong id="topLabel">-</strong>
          </div>
          <div class="stat">
            <span class="meta">预测概率</span>
            <strong id="topProb">-</strong>
          </div>
        </div>

        <div class="chart-card">
          <div class="meta">类别概率直方图</div>
          <div id="chart" class="chart-wrap"></div>
        </div>

        <div class="table-card" style="margin-top: 18px;">
          <div class="meta">完整概率明细</div>
          <table>
            <thead>
              <tr>
                <th>类别</th>
                <th>概率</th>
              </tr>
            </thead>
            <tbody id="resultTable"></tbody>
          </table>
        </div>
      </div>

      <div id="emptyState" class="empty">
        上传图片后，这里会显示分类概率和柱状图。
      </div>
    </section>
  </main>

  <script>
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const predictButton = document.getElementById("predictButton");
    const statusEl = document.getElementById("status");
    const resultPanel = document.getElementById("resultPanel");
    const emptyState = document.getElementById("emptyState");
    const topLabel = document.getElementById("topLabel");
    const topProb = document.getElementById("topProb");
    const resultTable = document.getElementById("resultTable");
    const chart = document.getElementById("chart");

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) {
        preview.style.display = "none";
        return;
      }

      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
      statusEl.textContent = `已选择图片：${file.name}`;
      statusEl.className = "status hint";
    });

    predictButton.addEventListener("click", async () => {
      const file = imageInput.files[0];
      if (!file) {
        statusEl.textContent = "请先选择一张图片。";
        statusEl.className = "status error";
        return;
      }

      const formData = new FormData();
      formData.append("image", file);

      predictButton.disabled = true;
      statusEl.textContent = "正在调用模型预测...";
      statusEl.className = "status hint";

      try {
        const response = await fetch("/predict", {
          method: "POST",
          body: formData
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "预测失败");
        }

        renderResult(data);
        statusEl.textContent = `模型: ${data.model_info.architecture} | 训练轮次: ${data.model_info.epoch ?? "-"}`;
        statusEl.className = "status hint";
      } catch (error) {
        statusEl.textContent = error.message;
        statusEl.className = "status error";
      } finally {
        predictButton.disabled = false;
      }
    });

    function renderResult(data) {
      emptyState.classList.add("hidden");
      resultPanel.classList.remove("hidden");

      topLabel.textContent = data.top_prediction.label;
      topProb.textContent = `${data.top_prediction.probability.toFixed(2)}%`;

      resultTable.innerHTML = "";
      chart.innerHTML = "";

      data.predictions.forEach(item => {
        const row = document.createElement("tr");
        row.innerHTML = `<td>${item.label}</td><td>${item.probability.toFixed(2)}%</td>`;
        resultTable.appendChild(row);

        const group = document.createElement("div");
        group.className = "bar-group";
        const height = Math.max(item.probability * 2.6, 2);
        group.innerHTML = `
          <div class="bar-value">${item.probability.toFixed(1)}%</div>
          <div class="bar" style="height:${height}px"></div>
          <div class="bar-label">${item.label}</div>
        `;
        chart.appendChild(group);
      });
    }
  </script>
</body>
</html>
